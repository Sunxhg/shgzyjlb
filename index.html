            gameTags.innerHTML = '';
            games.forEach(game => {
                const tag = document.createElement('span');
                tag.className = 'game-tag';
                tag.textContent = game;
                gameTags.appendChild(tag);
            });

            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'flex';
        }

        function shareResult() {
            const base = personalityBase[currentMBTI];
            const gameTags = document.querySelectorAll('.game-tag');
            const games = Array.from(gameTags).map(tag => tag.textContent);
            const text = `我的桌游MBTI是【${currentMBTI}·${base.title}】！\n推荐桌游：${games.join('、')}\n"${base.quote}"\n\n来测测你的→`;

            if (navigator.share) {
                navigator.share({
                    title: '测测你的桌游MBTI',
                    text: text,
                    url: window.location.href
                });
            } else {
                showToast('请截图分享朋友圈');
                setTimeout(() => {
                    document.getElementById('resultCard').style.border = '3px dashed #81c784';
                }, 100);
                setTimeout(() => {
                    document.getElementById('resultCard').style.border = 'none';
                }, 3000);
            }
        }

        function copyText() {
            const base = personalityBase[currentMBTI];
            const gameTags = document.querySelectorAll('.game-tag');
            const games = Array.from(gameTags).map(tag => tag.textContent);
            const text = `我的桌游MBTI是【${currentMBTI}·${base.title}】！\n推荐桌游：${games.join('、')}\n"${base.quote}"\n\n📍酸黄瓜桌游俱乐部\n⏰13:00-23:00\n杭州·开了6年的桌游店\n\n#桌游MBTI #酸黄瓜桌游俱乐部`;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('文案已复制，快去发朋友圈！');
                });
            } else {
                showToast('请长按截图保存');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
