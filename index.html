        // 绘制雷达图
        function drawRadarChart(mbti) {
            const canvas = document.getElementById('radarCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const maxR = 100;
            const labels = ['策略', '社交', '运气', '耐心', '创意'];
            const data = getRadarData(mbti);
            const maxVal = 100;
            const angleStep = (Math.PI * 2) / 5;

            ctx.clearRect(0, 0, w, h);

            // 绘制背景网格
            ctx.strokeStyle = 'rgba(129, 199, 132, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                const r = (maxR / 5) * i;
                for (let j = 0; j < 5; j++) {
                    const angle = j * angleStep - Math.PI / 2;
                    const x = cx + r * Math.cos(angle);
                    const y = cy + r * Math.sin(angle);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }

            // 绘制轴线
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const x = cx + maxR * Math.cos(angle);
                const y = cy + maxR * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            // 绘制数据区域
            ctx.beginPath();
            ctx.fillStyle = 'rgba(102, 187, 106, 0.3)';
            ctx.strokeStyle = '#2e7d32';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const r = (data[i] / maxVal) * maxR;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 绘制数据点
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const r = (data[i] / maxVal) * maxR;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#2e7d32';
                ctx.fill();
            }

            // 绘制标签
            ctx.font = '14px -apple-system, sans-serif';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const labelR = maxR + 25;
                const x = cx + labelR * Math.cos(angle);
                const y = cy + labelR * Math.sin(angle);
                ctx.fillText(labels[i], x, y + 5);
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');

            for (let i = 0; i < 15; i++) {

                p.style.left = Math.random() * 100 + '%';

                p.style.fontSize = (Math.random() * 15 + 15) + 'px';
                container.appendChild(p);
            }
        }
        createParticles();
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 从游戏池中随机选2个不重复的
        function pickRandomGames(pool) {
            const shuffled = shuffle(pool);
            return [shuffled[0], shuffled[1]];
        }

        function startMBTI() {
            quizMode = 'mbti';
            questions = shuffle(allQuestions).slice(0, 10);
            currentQuestion = 0;
            scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'flex';

        function startProTest() {
            quizMode = 'pro';
            questions = shuffle(proQuestions).slice(0, 10);

            proScore = 0;

            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('quizPage').style.display = 'flex';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNum').textContent = `第 ${currentQuestion + 1}/10 题`;
            document.getElementById('questionText').textContent = q.text;

            const optionsContainer = document.querySelector('.options');
            optionsContainer.innerHTML = '';

            if (quizMode === 'mbti') {
                const btnA = document.createElement('button');
                btnA.className = 'option-btn';
                btnA.textContent = 'A. ' + q.A.text;
                btnA.onclick = () => selectOption('A');
                optionsContainer.appendChild(btnA);

                const btnB = document.createElement('button');
                btnB.className = 'option-btn';
                btnB.textContent = 'B. ' + q.B.text;
                btnB.onclick = () => selectOption('B');
                optionsContainer.appendChild(btnB);
            } else {
                q.options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = ['A', 'B', 'C', 'D'][index] + '. ' + opt.text;
                    btn.onclick = () => selectProOption(index);
                    optionsContainer.appendChild(btn);
                });
            }

            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // 重新触发动画
            const card = document.getElementById('questionCard');
            card.style.animation = 'none';
            setTimeout(() => card.style.animation = 'slideUp 0.4s ease', 10);
        }

        function selectOption(choice) {
            const q = questions[currentQuestion];
            const selected = choice === 'A' ? q.A : q.B;

            for (let key in selected.scores) {
                scores[key] += selected.scores[key];
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function selectProOption(index) {
            const q = questions[currentQuestion];
            if (q.options[index].correct) {
                proScore += 1;
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

                proNext.style.borderLeftColor = '#ff9800';
            } else {
                proNext.textContent = '你已到达巅峰！来店里坐坐，酸黄瓜老板想认识你。';
                proNext.style.background = '#e8f5e9';
                proNext.style.color = '#2e7d32';
                proNext.style.borderLeftColor = '#66bb6a';
            }

            // 高段位庆祝彩带
            if (proScore >= 5) {
                createConfetti(result.color);
            }

            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'flex';
        }

        // 庆祝彩带
        function createConfetti(color) {
            // 清除旧彩带
            const old = document.querySelector('.confetti-container');
            if (old) old.remove();

            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const colors = [color, '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff85a1', '#a66cff'];
            const shapes = ['●', '■', '▲', '★', '◆'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.fontSize = (Math.random() * 12 + 8) + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 1.5 + 's';
                container.appendChild(confetti);
            }

            // 5秒后清除
            setTimeout(() => {
                if (container.parentNode) container.remove();
            }, 5000);
        }

        function shareResult() {
            let text;
            if (quizMode === 'mbti') {
                const base = personalityBase[currentMBTI];
                const gameTags = document.querySelectorAll('.game-tag');
                const games = Array.from(gameTags).map(tag => tag.textContent);
                text = `我的桌游MBTI是【${currentMBTI}·${base.title}】！\n推荐桌游：${games.join('、')}\n"${base.quote}"\n\n来测测你的→`;
            } else {
                const rank = document.getElementById('mbtiType').textContent;
                const title = document.getElementById('personalityTitle').textContent;
                text = `我的桌游段位是【${rank}·${title}】！\n来测测你的→`;
            }

            if (navigator.share) {
                navigator.share({
                    title: '测测你的桌游人格',
                    text: text,
                    url: window.location.href
                });
            } else {
                showToast('请截图分享朋友圈');
                setTimeout(() => {
                    document.getElementById('resultCard').style.border = '3px dashed #81c784';
                }, 100);
                setTimeout(() => {
                    document.getElementById('resultCard').style.border = 'none';
                }, 3000);
            }
        }

        function copyText() {
            let text;
            if (quizMode === 'mbti') {
                const base = personalityBase[currentMBTI];
                const gameTags = document.querySelectorAll('.game-tag');
                const games = Array.from(gameTags).map(tag => tag.textContent);
                text = `我的桌游MBTI是【${currentMBTI}·${base.title}】！\n推荐桌游：${games.join('、')}\n"${base.quote}"\n\n📍酸黄瓜桌游俱乐部\n杭州·开了6年的桌游店\n\n#桌游MBTI #酸黄瓜桌游俱乐部`;
            } else {
                const rank = document.getElementById('mbtiType').textContent;
                const title = document.getElementById('personalityTitle').textContent;
                text = `我的桌游段位是【${rank}·${title}】！\n\n📍酸黄瓜桌游俱乐部\n杭州·开了6年的桌游店\n\n#桌游段位 #酸黄瓜桌游俱乐部`;
            }

            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('文案已复制，快去发朋友圈！');
                });
            } else {
                showToast('请长按截图保存');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
