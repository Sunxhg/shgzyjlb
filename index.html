        // 绘制雷达图
        function drawRadarChart(personalityKey) {
            const canvas = document.getElementById('radarCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const maxR = 100;
            const labels = ['风格宽容度', '故事沉浸度', '社交活跃度', '运气依赖度', '运营策略度'];
            const data = getRadarData(personalityKey);
            const maxVal = 100;
            const angleStep = (Math.PI * 2) / 5;

            ctx.clearRect(0, 0, w, h);

            // 绘制背景网格
            ctx.strokeStyle = 'rgba(129, 199, 132, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                const r = (maxR / 5) * i;
                for (let j = 0; j < 5; j++) {
                    const angle = j * angleStep - Math.PI / 2;
                    const x = cx + r * Math.cos(angle);
                    const y = cy + r * Math.sin(angle);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }

            // 绘制轴线
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const x = cx + maxR * Math.cos(angle);
                const y = cy + maxR * Math.sin(angle);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            // 绘制数据区域
            const pColor = personalityData[personalityKey].color;
            ctx.beginPath();
            ctx.fillStyle = pColor + '40';
            ctx.strokeStyle = pColor;
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const r = (data[i] / maxVal) * maxR;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 绘制数据点
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const r = (data[i] / maxVal) * maxR;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = pColor;
                ctx.fill();
            }

            // 绘制标签
            ctx.font = '13px -apple-system, sans-serif';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            for (let i = 0; i < 5; i++) {
                const angle = i * angleStep - Math.PI / 2;
                const labelR = maxR + 25;
                const x = cx + labelR * Math.cos(angle);
                const y = cy + labelR * Math.sin(angle);
                ctx.fillText(labels[i], x, y + 5);
            }
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

            const q = questions[currentQuestion];

                    btn.className = 'option-btn';

                    btn.onclick = () => selectProOption(index);

            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            const card = document.getElementById('questionCard');
            card.style.animation = 'none';

        function selectOption(choice) {
            const q = questions[currentQuestion];
            const selected = choice === 'A' ? q.A : q.B;

            for (let key in selected.scores) {
                scores[key] += selected.scores[key];
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function selectProOption(index) {
            const q = questions[currentQuestion];
            if (q.options[index].correct) {
                proScore += 1;
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function selectGuessOption(index) {
            const q = questions[currentQuestion];
            const selected = q.options[index];
            const correct = selected === q.answer;

            if (correct) guessScore += 1;

            // 记录答题情况
            guessResults.push({
                question: currentQuestion + 1,
                answer: q.answer,
                yours: selected,
                correct: correct
            });

            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

            rankBadge.style.color = '#fff';

            // 绘制雷达图
            drawRadarChart(personalityKey);

            // 推荐桌游
            const gameTags = document.getElementById('gameTags');
            gameTags.innerHTML = '';
            const recommended = pickRecommendedGames(personalityKey);
            recommended.forEach(game => {
                const tag = document.createElement('span');
                tag.className = 'game-tag';
                tag.textContent = game;
                tag.style.background = 'linear-gradient(135deg, ' + p.color + '88, ' + p.color + '44)';
                tag.style.color = p.color;
                gameTags.appendChild(tag);
            });

            // 显示MBTI特有元素
            document.getElementById('rankBadge').style.display = 'flex';
            document.getElementById('classicQuote').style.display = 'block';
            document.getElementById('personalityDesc').style.display = 'block';
            document.getElementById('bestPartner').style.display = 'block';
            document.getElementById('radarSection').style.display = 'block';
            document.querySelector('.recommend-section').style.display = 'block';
            // 隐藏段位模式元素
            document.getElementById('proSection').style.display = 'none';

            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'flex';
        }

        // 根据人格推荐桌游
        function pickRecommendedGames(personalityKey) {
            const parts = personalityKey.split('-');
            const isKuanRong = parts[0] === '宽容';
            const isStory = parts[1] === '故事';
            const isHaoYun = parts[3] === '好运';

            // 根据人格特征推荐不同桌游
            if (isKuanRong && !isStory && !isHaoYun) {
                return pickRandomGames(['璀璨宝石', '七大奇迹：对决', '铁路环游']);
            } else if (isKuanRong && !isStory && isHaoYun) {
                return pickRandomGames(['哈铃果铃', '骆驼大赛', 'UNO']);
            } else if (isKuanRong && isStory && !isHaoYun) {
                return pickRandomGames(['诡镇奇谈：卡牌版', '忘海传记', '展翅翱翔']);
            } else if (isKuanRong && isStory && isHaoYun) {
                return pickRandomGames(['只言片语', '花见小路', '传情画意']);
            } else if (!isKuanRong && !isStory && !isHaoYun) {
                return pickRandomGames(['灵迹岛', '重塑火星', '历史巨轮']);
            } else if (!isKuanRong && !isStory && isHaoYun) {
                return pickRandomGames(['政变', '拉斯维加斯', '马尼拉']);
            } else if (!isKuanRong && isStory && !isHaoYun) {
                return pickRandomGames(['奥丁的盛宴', '伯明翰', '领国者']);
            } else {
                return pickRandomGames(['ROOT', '血色狂怒', '帝国曙光']);
            }
        }

        function showProResult() {
            // 按答对题数划分段位
            let rank;
            if (proScore <= 2) rank = '青铜';
            else if (proScore === 3) rank = '白银';
            else if (proScore <= 5) rank = '黄金';
            else if (proScore <= 7) rank = '铂金';
            else if (proScore <= 9) rank = '钻石';
            else rank = '王者';

            const result = proResults[rank];

            // 隐藏MBTI特有元素
            document.getElementById('rankBadge').style.display = 'none';
            document.getElementById('classicQuote').style.display = 'none';
            document.getElementById('personalityDesc').style.display = 'none';
            document.getElementById('bestPartner').style.display = 'none';
            document.getElementById('radarSection').style.display = 'none';
            // 隐藏推荐桌游（段位模式不显示）
            document.querySelector('.recommend-section').style.display = 'none';
            // 隐藏所有小人配件
            document.getElementById('devilHorns').style.display = 'none';
            document.getElementById('angelWings').style.display = 'none';
            document.getElementById('bigMouth').style.display = 'none';
            document.getElementById('hoodie').style.display = 'none';
            document.getElementById('luckyStars').style.display = 'none';
            document.getElementById('tools').style.display = 'none';
            document.getElementById('gems').style.display = 'none';
            document.getElementById('storyBook').style.display = 'none';
            document.getElementById('eyesDefault').style.display = 'block';
            document.getElementById('eyesEvil').style.display = 'none';
            document.getElementById('eyesShy').style.display = 'none';
            document.getElementById('eyesStar').style.display = 'none';
            document.getElementById('mouthDefault').style.display = 'block';

            // 显示段位专属区域
            document.getElementById('proSection').style.display = 'block';

            // 设置段位样式
            const mbtiType = document.getElementById('mbtiType');
            const personalityTitle = document.getElementById('personalityTitle');
            const catchphrase = document.getElementById('catchphrase');

            mbtiType.textContent = rank;
            mbtiType.className = 'mbti-type rank-' + result.class;
            // 覆盖MBTI模式的渐变文字，显示段位颜色
            mbtiType.style.background = 'none';
            mbtiType.style.webkitBackgroundClip = 'initial';
            mbtiType.style.webkitTextFillColor = result.color;

            personalityTitle.textContent = result.title;
            personalityTitle.style.color = result.color;
            personalityTitle.style.textShadow = '0 0 10px ' + result.color + '40';

            catchphrase.textContent = result.desc;
            catchphrase.style.color = result.color;
            catchphrase.style.fontStyle = 'normal';
            catchphrase.style.fontWeight = 'bold';

            // 设置小人颜色
            const avatarBody = document.getElementById('avatarBody');
            const avatarHead = document.getElementById('avatarHead');
            if (avatarBody) avatarBody.setAttribute('fill', result.color);
            if (avatarHead) avatarHead.setAttribute('fill', result.color + 'aa');

            // 段位徽章
            document.getElementById('proEmoji').textContent = result.emoji;
            document.getElementById('proPower').textContent = result.power;
            document.getElementById('proPower').style.color = result.color;

            // 得分进度条
            document.getElementById('proProgressText').textContent = proScore + ' / 10 题';
            const progressFill = document.getElementById('proProgressFill');
            progressFill.style.width = '0%';
            progressFill.style.background = 'linear-gradient(90deg, ' + result.color + ', ' + result.color + 'cc)';
            setTimeout(() => {
                progressFill.style.width = (proScore * 10) + '%';
            }, 300);

            // 段位故事
            const proStory = document.getElementById('proStory');
            proStory.textContent = result.detail;
            proStory.style.borderLeftColor = result.color;

            // 段位特权
            const proPrivilege = document.getElementById('proPrivilege');
            proPrivilege.textContent = result.privilege;
            proPrivilege.style.background = result.color + '18';
            proPrivilege.style.borderLeftColor = result.color;
            proPrivilege.style.color = result.color;

            // 进阶提示
            const proNext = document.getElementById('proNext');
            if (result.nextGap > 0) {
                proNext.textContent = '还差 ' + result.nextGap + ' 题即可晋升【' + result.nextRank + '】段位，再来一局试试！';
                proNext.style.background = '#fff3e0';
                proNext.style.color = '#666';
                proNext.style.borderLeftColor = '#ff9800';
            } else {
                proNext.textContent = '你已到达巅峰！来店里坐坐，酸黄瓜老板想认识你。';
                proNext.style.background = '#e8f5e9';
                proNext.style.color = '#2e7d32';
                proNext.style.borderLeftColor = '#66bb6a';
            }

            // 高段位庆祝彩带
            if (proScore >= 5) {
                createConfetti(result.color);
            }

            document.getElementById('quizPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'flex';
        }

        // 庆祝彩带
        function createConfetti(color) {
            // 清除旧彩带
            const old = document.querySelector('.confetti-container');
            if (old) old.remove();

            const container = document.createElement('div');
            container.className = 'confetti-container';
            document.body.appendChild(container);

            const colors = [color, '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff85a1', '#a66cff'];
            const shapes = ['●', '■', '▲', '★', '◆'];

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.fontSize = (Math.random() * 12 + 8) + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 1.5 + 's';
                container.appendChild(confetti);
            }

            // 5秒后清除
            setTimeout(() => {
                if (container.parentNode) container.remove();
            }, 5000);
        }

        function shareResult() {
            let text;
            if (quizMode === 'mbti') {
                const pKey = currentPersonalityKey;
                const p = personalityData[pKey];
                text = `我的桌游隐藏人格是【${p.name}】！\n"${p.tag}"\n\n来测测你的→`;
            } else if (quizMode === 'pro') {
                const rank = document.getElementById('mbtiType').textContent;
                const title = document.getElementById('personalityTitle').textContent;
                text = `我的桌游段位是【${rank}·${title}】！\n来测测你的→`;
            } else {
                const rank = document.getElementById('mbtiType').textContent;
                const score = document.getElementById('personalityTitle').textContent;
                text = `我在酸黄瓜桌游猜题挑战中${rank}，${score}！\n来测测你的→`;
            }

            if (navigator.share) {
                navigator.share({
                    title: '解锁你的桌游隐藏人格',
                    text: text,
                    url: window.location.href
                });
            } else {
                showToast('请截图分享朋友圈');
                setTimeout(() => {
                    document.getElementById('resultCard').style.border = '3px dashed #81c784';
                }, 100);
                setTimeout(() => {
                    document.getElementById('resultCard').style.border = 'none';
                }, 3000);
            }
        }

        function copyText() {
            let text;
            if (quizMode === 'mbti') {
                const pKey = currentPersonalityKey;
                const p = personalityData[pKey];
                text = `我的桌游隐藏人格是【${p.name}】！\n"${p.tag}"\n\n📍酸黄瓜桌游俱乐部\n杭州·开了6年的桌游店\n\n#桌游隐藏人格 #酸黄瓜桌游俱乐部`;
            } else if (quizMode === 'pro') {
                const rank = document.getElementById('mbtiType').textContent;
                const title = document.getElementById('personalityTitle').textContent;
                text = `我的桌游段位是【${rank}·${title}】！\n\n📍酸黄瓜桌游俱乐部\n杭州·开了6年的桌游店\n\n#桌游段位 #酸黄瓜桌游俱乐部`;
            } else {
                const rank = document.getElementById('mbtiType').textContent;
                const score = document.getElementById('personalityTitle').textContent;
                text = `我在酸黄瓜桌游猜题挑战中${rank}，${score}！\n\n📍酸黄瓜桌游俱乐部\n杭州·开了6年的桌游店\n\n#看图猜桌游 #酸黄瓜桌游俱乐部`;
            }

            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('文案已复制，快去发朋友圈！');
                });
            } else {
                showToast('请长按截图保存');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
    </script>
</body>
